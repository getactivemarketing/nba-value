# Railway deployment configuration
# This file lives in backend/ which Railway uses as the project root,
# so watchPatterns are relative to backend/, not the repo root.
# Last updated: 2026-04-07 to force redeploy
[build]
builder = "NIXPACKS"
watchPatterns = ["src/**", "assets/**", "requirements.txt", "Procfile", "railway.toml"]

[deploy]
startCommand = "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
